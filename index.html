<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🐾%3C/text%3E%3C/svg%3E"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Inter+Tight:wght@300;400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="src/tokens.css"/>
  <link rel="stylesheet" href="src/components.css"/>
  <link rel="stylesheet" href="src/mobile.css"/>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#EFE7DA">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#EFE7DA"/>
      <g transform="translate(600 400)">
        <text x="0" y="-20" font-family="Georgia, serif" font-size="110" font-style="italic" fill="#B8755B" text-anchor="middle">Modu</text>
        <text x="0" y="40" font-family="monospace" font-size="22" letter-spacing="8" fill="#3B2F22" text-anchor="middle">POMPOLARR · STROLLER</text>
        <circle cx="-70" cy="110" r="18" fill="none" stroke="#3B2F22" stroke-width="3"/>
        <circle cx="70" cy="110" r="18" fill="none" stroke="#3B2F22" stroke-width="3"/>
        <rect x="-100" y="70" width="200" height="30" rx="6" fill="none" stroke="#3B2F22" stroke-width="3"/>
      </g>
    </svg>
  </template>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/nav.jsx"></script>
  <script type="text/babel" src="src/hero.jsx"></script>
  <script type="text/babel" src="src/why-modes.jsx"></script>
  <script type="text/babel" src="src/anatomy-gallery.jsx"></script>
  <script type="text/babel" src="src/sections.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
      "accent": "#B8755B",
      "bone": "#EFE9DD",
      "dark": "#3B2F22",
      "serif": "newsreader",
      "hero": "moss"
    }/*EDITMODE-END*/;

    function App() {
      const [state, setState] = useState(TWEAK_DEFAULS);
      useReveal();

      // Apply font family switch
      useEffect(() => {
        const map = {
          'newsreader': '"Newsreader", "Noto Serif Thai", Georgia, serif',
          'fraunces':   '"Fraunces", "Noto Serif Thai", Georgia, serif',
          'ibm-plex':   '"IBM Plex Sans Thai", Georgia, serif',
        };
        document.documentElement.style.setProperty('--f-serif', map[state.serif] || map.newsreader);
      }, [state.serif]);

      return (
        <>
          <Nav/>
          <SideRail/>
          <Hero/>
          <WhyModu/>
          <Modes/>
          <Anatomy/>
          <Gallery/>
          <Compare/>
          <Specs/>
          <Stories/>
          <FAQ/>
          <CTA/>
          <Footer/>
          <Tweaks state={state} setState={setState}/>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
